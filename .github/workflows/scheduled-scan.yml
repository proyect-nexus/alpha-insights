name: Scheduled Options Scan

on:
  schedule:
    - cron: '40 14 * * 1-5'  # 15:30 Madrid (CEST, UTC+2)
    - cron: '0 17 * * 1-5'   # 19:00 Madrid
    - cron: '30 19 * * 1-5'  # 21:30 Madrid
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduled scan
        id: scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scheduled_scan.py --threshold 40

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scans/scheduled/
          if ! git diff --quiet --cached; then
            git commit -m "scan: scheduled scan $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi

      - name: Send email alert via Resend
        if: steps.scan.outputs.has_critical == 'true'
        run: |
          python -c "
          import json, sys
          with open('scans/scheduled/latest_alert.html') as f:
              html = f.read()
          with open('scans/scheduled/latest_alert.txt') as f:
              text = f.read()
          emails = [e.strip() for e in '${{ secrets.ALERT_EMAILS }}'.split(',')]
          payload = {
              'from': 'Alpha Insights <${{ secrets.RESEND_FROM }}>',
              'to': emails,
              'subject': 'ALERTA Insider Trading — Score >= 60 detectado',
              'html': html,
              'text': text,
          }
          print(json.dumps(payload))
          " > /tmp/email_payload.json
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/email_payload.json
